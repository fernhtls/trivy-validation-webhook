---
# Webhook Deployment - trivy-webhook
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: trivy-webhook
  name: trivy-webhook
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trivy-webhook
  template:
    metadata:
      labels:
        app: trivy-webhook
    spec:
      containers:
      - image: localhost/trivy-webhook:latest 
        name: trivy-webhook
        imagePullPolicy: Never
        ports:
        - containerPort: 443
        volumeMounts:
          - name: ca-certs
            mountPath: "/app/ca-certs"
            readOnly: true
      volumes:
        - name: ca-certs
          secret:
            secretName: trivy-webhook-tls
---
# Service creation
apiVersion: v1
kind: Service
metadata:
  labels:
    app: trivy-webhook
  name: trivy-webhook
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 443
  selector:
    app: trivy-webhook
status:
  loadBalancer: {}
