# Register a validating webhook that intercepts pod creation.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: trivy-validation.example.com
webhooks:
  - name: trivy-validation.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    # Only intercept pod creation
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    clientConfig:
      # The webhook service running in the cluster
      service:
        name: trivy-webhook
        namespace: default
        path: /validation
        port: 443
      # CA bundle for TLS verification
      caBundle: "<REPLACE BASE64>"
    # Fail open if the webhook is unavailable
    failurePolicy: Ignore
    # Timeout for webhook calls
    timeoutSeconds: 10
    # Skip scanning for system namespaces
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-node-lease
            - kube-public
            - default
